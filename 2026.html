<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Nunito', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* ===== Aurora overlay ===== */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background:
                radial-gradient(circle at 20% 30%, rgba(255,105,180,0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(72,202,228,0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(255,215,0,0.08) 0%, transparent 50%);
            animation: aurora 8s ease-in-out infinite alternate;
            z-index: 0;
            pointer-events: none;
        }
        @keyframes aurora {
            0% { opacity: 0.6; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        /* ===== Light rope ===== */
        .lightrope {
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            position: fixed;
            top: 0;
            z-index: 50;
            margin: 0;
            padding: 0;
            pointer-events: none;
            width: 100%;
            height: 30px;
        }
        .lightrope li {
            position: relative;
            animation-fill-mode: both;
            animation-iteration-count: infinite;
            list-style: none;
            margin: 0;
            padding: 0;
            display: inline-block;
            width: 12px;
            height: 28px;
            border-radius: 50%;
            margin: 20px 14px;
            background: rgba(237, 243, 48, 1);
            animation-name: flash-1;
            animation-duration: 2s;
        }
        .lightrope li:nth-child(2n+1) {
            background: rgba(0, 255, 255, 1);
            animation-name: flash-2;
            animation-duration: 0.4s;
        }
        .lightrope li:nth-child(4n+1) {
            background: rgba(247, 0, 148, 1);
            animation-name: flash-3;
            animation-duration: 1.1s;
        }
        .lightrope li:nth-child(odd) {
            animation-duration: 1.8s;
        }
        .lightrope li::before {
            content: "";
            position: absolute;
            background: #222;
            width: 10px;
            height: 8px;
            border-radius: 3px;
            top: 2px;
            left: 1px;
        }
        .lightrope li::after {
            content: "";
            position: absolute;
            top: -14px;
            left: 9px;
            width: 52px;
            height: 18px;
            border-bottom: solid #222 2px;
            border-radius: 50%;
        }
        .lightrope li:last-child::after {
            content: none;
        }
        .lightrope li:first-child {
            margin-left: -40px;
        }

        @keyframes flash-1 {
            0%, 100% { background: rgb(237, 243, 48); box-shadow: 0 5px 24px 3px rgba(237, 243, 48, 1); }
            50% { background: rgb(237, 243, 48); box-shadow: 0 5px 24px 3px rgba(237, 243, 48, 0.2); }
        }
        @keyframes flash-2 {
            0%, 100% { background: rgba(0, 255, 255, 1); box-shadow: 0 5px 24px 3px rgba(0, 247, 175, 1); }
            50% { background: rgba(0, 247, 175, 1); box-shadow: 0 5px 24px 3px rgba(0, 247, 175, 0.2); }
        }
        @keyframes flash-3 {
            0%, 100% { background: rgba(247, 0, 148, 1); box-shadow: 0 5px 24px 3px rgba(0, 247, 175, 1); }
            50% { background: rgba(247, 0, 148, 0.4); box-shadow: 0 5px 24px 3px rgba(0, 247, 175, 0.2); }
        }

        /* ===== Floating balloons (span) ===== */
        .balloon {
            position: fixed;
            pointer-events: none;
            width: 80px;
            height: 80px;
            background: url('img/Balloon-Border.png') no-repeat center/contain;
            z-index: 2;
            animation: floatUp 6s linear forwards;
            opacity: 0.8;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0.6;
            }
            100% {
                transform: translateY(-200px) rotate(10deg);
                opacity: 0;
            }
        }

        /* ===== Main Card ===== */
        .card {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 780px;
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 26px 24px 30px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow:
                0 20px 60px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.1);
            animation: card-enter 1.2s ease-out forwards;
            transform: translateY(30px);
            opacity: 0;
            margin-top: 20px;
        }
        @keyframes card-enter {
            to { transform: translateY(0); opacity: 1; }
        }

        .title {
            text-align: center;
            margin-bottom: 16px;
        }
        .title h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3em;
            background: linear-gradient(135deg, #f6d365, #fda085, #f093fb, #f5576c);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 4s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(255,105,180,0.3));
        }
        .title p {
            color: rgba(255,255,255,0.7);
            font-size: 1.05em;
            margin-top: 4px;
            letter-spacing: 2px;
        }
        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* ===== Video Container ===== */
        .video-wrapper {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            aspect-ratio: 16 / 9;
            background: #000;
        }
        .video-wrapper video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }
        /* Neon border */
        .video-wrapper::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px;
            right: -2px; bottom: -2px;
            border-radius: 22px;
            background: conic-gradient(
                #ff6a88, #ff99ac, #fccb90, #f6d365,
                #a8edea, #fed6e3, #ff6a88
            );
            z-index: -1;
            animation: spin-border 4s linear infinite;
        }
        @keyframes spin-border {
            to { transform: rotate(360deg); }
        }

        /* ===== Controls ===== */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .controls button {
            padding: 10px 22px;
            border: none;
            border-radius: 50px;
            font-size: 0.95em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            box-shadow: 0 4px 20px rgba(245,87,108,0.35);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .controls button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 30px rgba(245,87,108,0.5);
        }
        .controls button.secondary {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: none;
        }
        .controls button.secondary:hover {
            background: rgba(255,255,255,0.2);
        }

        /* ===== Navigation Row (2024 | 2025 buttons) ===== */
        .nav-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-top: 18px;
            flex-wrap: wrap;
        }
        .nav-row button {
            padding: 10px 28px;
            border: none;
            border-radius: 50px;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.85);
            letter-spacing: 0.5px;
        }
        .nav-row button:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0,0,0,0.3);
        }
        .nav-row button.nav-2024 {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
        }
        .nav-row button.nav-2025 {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border: none;
        }

        /* ===== Footer ===== */
        .footer-message {
            text-align: center;
            margin-top: 18px;
            font-size: 1.05em;
            color: rgba(255,255,255,0.6);
            font-weight: 600;
            letter-spacing: 1px;
        }
        .footer-message span {
            display: inline-block;
            animation: heart-beat 1.4s ease-in-out infinite;
        }
        @keyframes heart-beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* ===== Confetti Canvas ===== */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* ===== Loading ===== */
        .loading-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.6);
            z-index: 5;
            border-radius: 20px;
            transition: opacity 0.6s ease;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #f5576c;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== Balloon spawner position fix ===== */
        #balloon-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
        }

        /* ===== Responsive ===== */
        @media (max-width: 600px) {
            .card { padding: 18px 14px 24px; }
            .title h1 { font-size: 2.2em; }
            .title p { font-size: 0.9em; }
            .controls button {
                padding: 8px 16px;
                font-size: 0.85em;
                flex: 1;
                justify-content: center;
            }
            .nav-row button {
                padding: 8px 20px;
                font-size: 0.9em;
                flex: 1;
            }
            .footer-message { font-size: 0.9em; }
            .lightrope li {
                width: 8px;
                height: 20px;
                margin: 12px 8px;
            }
        }
        @media (max-width: 400px) {
            .title h1 { font-size: 1.7em; }
        }
    </style>
</head>
<body>

    <!-- Light rope -->
    <ul class="lightrope">
        <li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li>
        <li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li>
        <li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li>
        <li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li>
    </ul>

    <!-- Balloon container -->
    <div id="balloon-container"></div>

    <!-- Confetti canvas -->
    <canvas id="confetti-canvas"></canvas>

    <!-- Main Card -->
    <div class="card">
        <div class="title">
            <h1>🎂 Happy Birthday 2026</h1>
            <p>✨ Chị Hiền xinh đẹp ✨</p>
        </div>

        <div class="video-wrapper">
            <video id="pianoVideo" playsinline loop>
                <source src="img/hpbdPiano.mp4" type="video/mp4">
                Trình duyệt không hỗ trợ video.
            </video>
            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
            </div>
        </div>

        <div class="controls">
            <button id="playBtn">▶ Phát</button>
            <button id="muteBtn" class="secondary">🔊 Âm thanh</button>
            <button id="fullscreenBtn" class="secondary">⛶ Toàn màn hình</button>
        </div>

        <!-- Navigation: 2024 | 2025 -->
        <div class="nav-row">
            <button class="nav-2024" onclick="window.location.href='video.html'">🎬 Năm 2024</button>
            <button class="nav-2025" onclick="window.location.href='2025.html'">🎉 Năm 2025</button>
        </div>

        <div class="footer-message">
            🎶 Chúc Chị luôn vui tươi, hạnh phúc &nbsp;<span>❤️</span>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('pianoVideo');
            const playBtn = document.getElementById('playBtn');
            const muteBtn = document.getElementById('muteBtn');
            const fullBtn = document.getElementById('fullscreenBtn');
            const loading = document.getElementById('loadingOverlay');
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            const balloonContainer = document.getElementById('balloon-container');

            // ===== Resize canvas =====
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // ===== Confetti system =====
            const colors = ['#f5576c','#f093fb','#f6d365','#fda085','#a8edea','#fed6e3','#ff6a88','#ffd700'];
            let confettiPieces = [];

            class Confetti {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height - canvas.height;
                    this.w = Math.random() * 10 + 5;
                    this.h = Math.random() * 6 + 3;
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                    this.vx = (Math.random() - 0.5) * 2;
                    this.vy = Math.random() * 3 + 1;
                    this.rotation = Math.random() * 360;
                    this.rotSpeed = (Math.random() - 0.5) * 6;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.rotation += this.rotSpeed;
                    if (this.y > canvas.height + 20) {
                        this.y = -20;
                        this.x = Math.random() * canvas.width;
                        this.vy = Math.random() * 3 + 1;
                    }
                }
                draw() {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation * Math.PI / 180);
                    ctx.fillStyle = this.color;
                    ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
                    ctx.restore();
                }
            }

            function spawnConfetti(count) {
                for (let i = 0; i < count; i++) {
                    confettiPieces.push(new Confetti());
                }
            }
            spawnConfetti(120);
            setInterval(() => spawnConfetti(6), 200);

            function animateConfetti() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = confettiPieces.length - 1; i >= 0; i--) {
                    confettiPieces[i].update();
                    confettiPieces[i].draw();
                }
                requestAnimationFrame(animateConfetti);
            }
            animateConfetti();

            // ===== Balloon spawner (like kite/balloon in index) =====
            function createBalloon() {
                const el = document.createElement('div');
                el.className = 'balloon';
                el.style.left = (Math.random() * 90 + 5) + '%';
                el.style.width = (Math.random() * 40 + 50) + 'px';
                el.style.height = el.style.width;
                el.style.animationDuration = (Math.random() * 4 + 5) + 's';
                balloonContainer.appendChild(el);
                setTimeout(() => el.remove(), 10000);
            }
            // Spawn balloons continuously
            setInterval(createBalloon, 1200);
            // Initial burst
            for (let i = 0; i < 8; i++) {
                setTimeout(createBalloon, i * 300);
            }

            // ===== Video controls =====
            video.addEventListener('loadeddata', () => {
                loading.classList.add('hidden');
            });
            setTimeout(() => loading.classList.add('hidden'), 5000);

            playBtn.addEventListener('click', () => {
                if (video.paused) {
                    video.play().catch(() => {});
                    playBtn.textContent = '⏸ Tạm dừng';
                } else {
                    video.pause();
                    playBtn.textContent = '▶ Phát';
                }
            });

            video.addEventListener('click', () => {
                if (video.paused) {
                    video.play().catch(() => {});
                    playBtn.textContent = '⏸ Tạm dừng';
                } else {
                    video.pause();
                    playBtn.textContent = '▶ Phát';
                }
            });

            video.addEventListener('ended', () => {
                playBtn.textContent = '▶ Phát';
            });

            muteBtn.addEventListener('click', () => {
                video.muted = !video.muted;
                muteBtn.textContent = video.muted ? '🔇 Tắt tiếng' : '🔊 Âm thanh';
            });

            fullBtn.addEventListener('click', () => {
                if (video.requestFullscreen) {
                    video.requestFullscreen();
                } else if (video.webkitRequestFullscreen) {
                    video.webkitRequestFullscreen();
                }
            });

            // Auto-play attempt
            setTimeout(() => {
                video.play().then(() => {
                    playBtn.textContent = '⏸ Tạm dừng';
                }).catch(() => {});
            }, 1000);
        });
    </script>
</body>
</html>
